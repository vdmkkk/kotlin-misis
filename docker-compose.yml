services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: habits
      POSTGRES_PASSWORD: habits
      POSTGRES_DB: habits
    ports:
      - "5453:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habits"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: ./backend
    ports:
      - "8182:8000"
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://habits:habits@db:5432/habits
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
